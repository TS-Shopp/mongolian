<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEMKA SHOPP - Ухаалаг Дэлгүүр</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #334155;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 20px 0;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .header p {
            margin-top: 5px;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1e293b;
            align-self: flex-start;
            padding-left: 4px;
        }

        /* УТАС ДЭЭР ЯГ ХАЖУУ ХАЖУУГААРАА 2 БАГАНА БОЛГОХ ҮНДСЭН ХЭСЭГ */
        .product-container {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 10px !important;
            width: 100% !important;
            max-width: 1200px;
        }

        /* Компьютер дээр дэлгэц томрохоор олон багана болно */
        @media (min-width: 768px) {
            .product-container {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)) !important;
                gap: 20px !important;
            }
        }

        .product-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between;
            height: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .product-card img {
            width: 100% !important;
            height: 135px !important;
            object-fit: cover;
            border-radius: 8px;
        }

        @media (min-width: 768px) {
            .product-card img {
                height: 180px !important;
            }
        }

        .product-title {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            color: #1e293b;
            text-align: left;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 34px;
            line-height: 1.3;
        }

        .product-price {
            font-weight: 700;
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: left;
        }

        .btn-buy {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 8px 4px;
            width: 100%;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Модал цонхны загвар */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            width: 92%;
            max-width: 400px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }

        .price-details {
            text-align: left;
            background-color: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
        }

        .price-text {
            font-weight: 700;
            color: #1e293b;
            font-size: 16px;
            text-align: center;
            margin-bottom: 4px;
        }

        .product-views-text {
            color: #3b82f6;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
            color: #475569;
        }

        .total-text {
            color: #10b981;
            font-size: 16px;
            font-weight: 700;
            margin-top: 8px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
        }

        .modal-bank-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .bank-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .bank-info-row:last-child {
            margin-bottom: 0;
        }

        .bank-info-label {
            color: #64748b;
        }

        .bank-info-value {
            font-weight: 700;
            color: #1e293b;
        }

        .btn-copy {
            background-color: white;
            border: 1px solid #cbd5e1;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 4px;
        }
        
        .btn-close-modal {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TEMKA SHOPP</h1>
        <p>Ирээдүйн ухаалаг онлайн дэлгүүр</p>
    </div>

    <div class="section-title">Манай бүтээгдэхүүнүүд</div>

    <div class="product-container" id="homeProductGrid">
        <p style='color:#64748b; font-size:14px;'>Барааг ачаалж байна...</p>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <h3 style="text-align: center; font-size: 16px; font-weight: 800;">🛒 Захиалга Баталгаажуулах</h3>
            
            <div class="price-details">
                <p class="price-text" id="modalProductTitle"></p>
                <p class="product-views-text" id="modalProductViews">👀 Үзсэн: 0</p>
                <div class="price-row">
                    <span>Барааны үнэ:</span>
                    <span id="modalProductPriceOnly">0₮</span>
                </div>
                <div class="price-row">
                    <span>Хүргэлт:</span>
                    <span style="color: #3b82f6;">+3,000₮</span>
                </div>
                <div class="total-text">
                    <span>Нийт дүн:</span>
                    <span id="modalTotalWithShipping">0₮</span>
                </div>
            </div>
            
            <div class="modal-bank-card">
                <div class="bank-info-row">
                    <span class="bank-info-label">Банк:</span>
                    <span class="bank-info-value" style="color: #1d4ed8;">ХХБ (TDB)</span>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label">Данс:</span>
                    <div>
                        <span class="bank-info-value" id="bankAcc">428025046</span>
                        <button class="btn-copy" onclick="window.copyText('bankAcc', this)">Хуулах</button>
                    </div>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label">Хүлээн авагч:</span>
                    <span class="bank-info-value">Б.Тэмүүжин</span>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label" style="color:#ef4444; font-weight:bold;">Утга:</span>
                    <span class="bank-info-value" style="color:#ef4444; font-size:11px;">Утасны дугаараа бичээрэй</span>
                </div>
            </div>

            <button class="btn-close-modal" onclick="window.closeModal()">Төлбөр хийсний дараа чатаар холбогдоорой 👍</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        window.onload = function() {
            var grid = document.getElementById("homeProductGrid");
            if (!grid) return;
            
            database.ref('products').on('value', function(snapshot) {
                grid.innerHTML = ""; 
                if (!snapshot.exists()) {
                    grid.innerHTML = "<p>Бараа олдсонгүй.</p>";
                    return;
                }
                
                snapshot.forEach(function(childSnapshot) {
                    var prodId = childSnapshot.key;
                    var prod = childSnapshot.val();
                    var numericPrice = parseInt(prod.price ? prod.price.toString().replace(/[^0-9]/g, '') : 0) || 0;
                    
                    var card = document.createElement("div");
                    card.className = "product-card";
                    card.innerHTML =
                        '<img src="' + (prod.image || 'https://via.placeholder.com/200') + '" alt="' + prod.name + '">' +
                        '<h3 class="product-title">' + prod.name + '</h3>' +
                        '<p class="product-price">' + numericPrice.toLocaleString() + '₮</p>' +
                        '<button class="btn-buy" onclick="window.openModal(\'' + prodId + '\', \'' + prod.name + '\', \'' + numericPrice + '\')">Захиалах</button>';
                    grid.appendChild(card);
                });
            });
        };

        window.openModal = function(prodId, name, price) {
            var numericPrice = parseInt(price) || 0;
            document.getElementById("modalProductTitle").innerText = name;
            document.getElementById("modalProductPriceOnly").innerText = numericPrice.toLocaleString() + "₮";
            document.getElementById("modalTotalWithShipping").innerText = (numericPrice + 3000).toLocaleString() + "₮";
            
            var viewRef = database.ref('products/' + prodId + '/views');
            viewRef.transaction(function(v) { return (v || 0) + 1; });
            viewRef.on('value', function(s) {
                document.getElementById("modalProductViews").innerText = "👀 Энэ барааг " + (s.val() || 0) + " удаа үзсэн байна";
            });
            document.getElementById("orderModal").style.display = "flex";
        };

        window.closeModal = function() {
            document.getElementById("orderModal").style.display = "none";
        };

        window.copyText = function(id, btn) {
            navigator.clipboard.writeText(document.getElementById(id).innerText).then(function() {
                var txt = btn.innerText; btn.innerText = "Хуулагдлаа!";
                setTimeout(function() { btn.innerText = txt; }, 2000);
            });
        };
    </script>
</body>
</html>
