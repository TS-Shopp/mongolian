<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&S Shopp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #060709; 
            color: #ffffff; 
            padding-bottom: 50px; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Навбар */
        .navbar {
            background-color: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #161a23;
        }
        .nav-logo { font-size: 18px; font-weight: 800; color: #ffffff; text-decoration: none; }
        .cart-status {
            font-weight: 700;
            font-size: 12px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            background: #161b22;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        .main-container { width: 94%; max-width: 1200px; margin: 0 auto; }

        /* Баннер */
        .hero-banner {
            margin: 12px 0 18px 0;
            background-color: #0d1117;
            background-image: linear-gradient(135deg, rgba(6, 7, 9, 0.85) 0%, rgba(13, 17, 23, 0.6) 100%), 
                              url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            border-radius: 16px;
            padding: 24px 18px;
            border: 1px solid #1f242d;
        }
        .hero-banner h1 { font-size: 1.8rem; font-weight: 900; color: #ffffff; margin-bottom: 4px; }
        .hero-banner p { color: #e2e8f0; font-size: 12px; }

        /* Дизайнлаг Ангилал / Категори сонгох хэсэг */
        .category-scroll-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 14px 0;
            scrollbar-width: none;
        }
        .category-scroll-container::-webkit-scrollbar { display: none; }
        
        .cat-chip {
            background: #0d1117;
            border: 1px solid #21262d;
            color: #8b949e;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cat-chip.active {
            background: #8b5cf6;
            color: #ffffff;
            border-color: #8b5cf6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* Барааны тор (Grid) */
        .product-container { 
            display: grid !important; 
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 10px !important; 
            width: 100% !important; 
        }

        .product-card { 
            background: #0d1117; 
            border: 1px solid #21262d; 
            border-radius: 14px; 
            padding: 8px; 
            display: flex !important; 
            flex-direction: column !important; 
            justify-content: space-between; 
            height: 100%; 
            position: relative; 
        }

        .product-img-box {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            overflow: hidden;
            background-color: #060709;
            cursor: pointer;
        }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 6px 2px 0 2px; }
        .product-title { 
            font-size: 12px; 
            font-weight: 600; 
            margin: 4px 0 2px 0; 
            color: #f1f5f9; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            line-clamp: 2;
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            height: 32px; 
            line-height: 1.3; 
        }
        .product-price { font-weight: 800; color: #ffffff; font-size: 14px; margin: 4px 0 6px 0; }

        /* Хэмжээ сонгох хэсэг */
        .size-selection-wrapper { margin: 4px 0 8px 0; }
        .size-label { font-size: 9px; color: #8b949e; margin-bottom: 4px; font-weight: 600; }
        .size-buttons-group { display: flex; gap: 4px; }
        .size-btn {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 5px 0;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .size-btn.selected { background: #8b5cf6; border-color: #8b5cf6; color: #ffffff; }

        /* Товчнууд */
        .btn-group { display: flex; gap: 4px; margin-top: auto; width: 100%; position: relative; z-index: 10; }
        .btn-buy { 
            flex: 1.2; 
            background: #8b5cf6; 
            color: #ffffff; 
            border: none; 
            padding: 9px 0; 
            border-radius: 8px; 
            font-size: 11px; 
            cursor: pointer; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 3px; 
        }
        .btn-cart { 
            flex: 1; 
            background: #161b22; 
            color: #ffffff; 
            border: 1px solid #30363d; 
            padding: 9px 0; 
            border-radius: 8px; 
            font-size: 11px; 
            cursor: pointer; 
            font-weight: 600; 
        }

        /* Модал Цонх */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(8px); 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { 
            background-color: #0d1117; 
            border: 1px solid #21262d; 
            color: white; 
            padding: 20px; 
            border-radius: 18px; 
            width: 92%; 
            max-width: 400px; 
            position: relative; 
        }
        .close-btn { position: absolute; right: 16px; top: 12px; font-size: 22px; cursor: pointer; color: #6e7681; }
        .btn-close-modal { background: #8b5cf6; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: bold; margin-top: 14px; }

        @media (min-width: 768px) { 
            .product-container { grid-template-columns: repeat(4, 1fr) !important; gap: 16px !important; } 
            .product-img-box { height: 180px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">T&S SHOPP</a>
        <a href="cart.html" class="cart-status">
            <i class="fa-solid fa-cart-shopping"></i> Сагс (<span id="headerCartCount">0</span>)
        </a>
    </nav>

    <main class="main-container">
        <header class="hero-banner">
            <h1>T&S SHOPP</h1>
            <p>Дэлгүүрийн шинэ ба трэнд загварууд.</p>
        </header>

        <div class="category-scroll-container" id="categoryContainer">
            <button class="cat-chip active" onclick="window.filterCategory('all', this)"><i class="fa-solid fa-border-all"></i> Бүгд</button>
            <button class="cat-chip" onclick="window.filterCategory('Шинэ', this)"><i class="fa-solid fa-fire"></i> Шинэ</button>
            <button class="cat-chip" onclick="window.filterCategory('Цамц', this)"><i class="fa-solid fa-shirt"></i> Цамц</button>
            <button class="cat-chip" onclick="window.filterCategory('Өмд', this)"><i class="fa-solid fa-user-ninja"></i> Өмд</button>
            <button class="cat-chip" onclick="window.filterCategory('Гутал', this)"><i class="fa-solid fa-shoe-prints"></i> Гутал</button>
            <button class="cat-chip" onclick="window.filterCategory('Аксессуар', this)"><i class="fa-solid fa-gem"></i> Аксессуар</button>
        </div>

        <div class="product-container" id="homeProductGrid">
            <p style='color:#6e7681; font-size:12px;'>Бараа ачаалж байна...</p>
        </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <h3 style="text-align: center; font-size: 15px; font-weight: 800; margin-bottom:8px;">🛒 Захиалах</h3>
            <p id="modalProductTitle" style="text-align: center; font-size: 13px; color: #a78bfa; margin-bottom: 12px;"></p>
            <p style="font-size: 12px; color: #8b949e; text-align: center;">Сагс хуудас руу шилжин төлбөрөө баталгаажуулна уу.</p>
            <button class="btn-close-modal" onclick="window.location.href='cart.html'">Сагс руу очих</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let allProductsCache = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        window.onload = function() {
            window.updateCartCount();
            database.ref('products').on('value', function(snapshot) {
                allProductsCache = [];
                if (snapshot.exists()) {
                    snapshot.forEach(function(child) {
                        allProductsCache.push({ id: child.key, data: child.val() });
                    });
                }
                window.renderProducts(allProductsCache);
            });
        };

        window.updateCartCount = function() {
            const countElement = document.getElementById('headerCartCount');
            if (countElement) {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                countElement.textContent = totalItems;
            }
        };

        window.filterCategory = function(categoryName, btn) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');

            if (categoryName === 'all') {
                window.renderProducts(allProductsCache);
            } else {
                let filtered = allProductsCache.filter(item => {
                    let cat = item.data.category || '';
                    return cat.toLowerCase().includes(categoryName.toLowerCase());
                });
                window.renderProducts(filtered);
            }
        };

        window.selectSize = function(btn, size, e) {
            if (e) e.stopPropagation();
            const parent = btn.parentElement;
            parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            const card = btn.closest('.product-card');
            if (card) { card.setAttribute('data-selected-size', size); }
        };

        window.addToCart = function(name, price, imgUrl, btnElement, e) {
            if (e) e.stopPropagation();

            const card = btnElement.closest('.product-card');
            const chosenSize = card ? (card.getAttribute('data-selected-size') || 'M') : 'M';

            let existingItem = cart.find(item => item.name === name && item.size === chosenSize);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ 
                    name: name, 
                    price: parseInt(price), 
                    image: imgUrl, 
                    size: chosenSize, 
                    quantity: 1 
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            window.updateCartCount();
            alert("✅ " + name + " (" + chosenSize + ") сагсанд нэмэгдлээ!");
        };

        window.renderProducts = function(productsList) {
            const grid = document.getElementById("homeProductGrid");
            if (!grid) return;
            grid.innerHTML = "";

            if (productsList.length === 0) {
                grid.innerHTML = "<p style='color:#6e7681; font-size:12px; grid-column: 1/-1; text-align:center;'>Энэ ангилалд бараа олдсонгүй.</p>";
                return;
            }

            productsList.forEach(function(item) {
                let prod = item.data;
                let numericPrice = parseInt(prod.price ? prod.price.toString().replace(/[^0-9]/g, '') : 0) || 0;
                let imgUrl = (prod.images && prod.images.length > 0) ? prod.images[0] : (prod.image || 'https://via.placeholder.com/200');

                let card = document.createElement("div");
                card.className = "product-card";
                card.setAttribute('data-selected-size', 'M');

                let safeName = prod.name ? prod.name.replace(/'/g, "\\'") : 'Бараа';

                card.innerHTML = `
                    <div class="product-img-box">
                        <img src="${imgUrl}" alt="${safeName}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${prod.name}</h3>
                        <p class="product-price">${numericPrice.toLocaleString()}₮</p>
                    </div>
                    <div class="size-selection-wrapper">
                        <div class="size-label">Хэмжээ сонгох:</div>
                        <div class="size-buttons-group">
                            <button type="button" class="size-btn" onclick="window.selectSize(this, 'XS', event)">XS</button>
                            <button type="button" class="size-btn" onclick="window.selectSize(this, 'S', event)">S</button>
                            <button type="button" class="size-btn selected" onclick="window.selectSize(this, 'M', event)">M</button>
                            <button type="button" class="size-btn" onclick="window.selectSize(this, 'L', event)">L</button>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-buy" onclick="window.openModal('${safeName}', '${numericPrice}')"><i class="fa-solid fa-bag-shopping"></i> Захиалах</button>
                        <button type="button" class="btn-cart" onclick="window.addToCart('${safeName}', ${numericPrice}, '${imgUrl}', this, event)">Сагслах</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        window.openModal = function(name, price) {
            document.getElementById("modalProductTitle").innerText = name + " - " + parseInt(price).toLocaleString() + "₮";
            document.getElementById("orderModal").style.display = "flex";
        };

        window.closeModal = function() {
            document.getElementById("orderModal").style.display = "none";
        };
    </script>
</body>
</html>
